<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Progreso - Discipulado</title>
    <style>
        :root { --primary: #6c5ce7; --bg: #f0f2f5; --success: #27ae60; --dark: #2d3436; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; min-height: 100vh; margin: 0; overflow-x: hidden; }
        
        .container { width: 95%; max-width: 600px; padding: 40px 20px; text-align: center; }
        .header { color: var(--primary); font-weight: bold; text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem; margin-bottom: 5px; }
        .reference { font-size: 2rem; margin: 10px 0; color: var(--dark); }
        
        .verse-box { font-size: 1.3rem; margin: 20px 0; color: var(--dark); min-height: 120px; line-height: 1.6; text-align: left; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; }
        .hidden-word { background: #dfe6e9; color: #dfe6e9; border-bottom: 2px solid #b2bec3; border-radius: 3px; }
        
        input[type="text"] { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 12px; font-size: 1.1rem; outline: none; transition: 0.3s; box-sizing: border-box; }
        input:focus { border-color: var(--primary); }
        
        .controls { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-hint { background: #fdcb6e; color: #2d3436; }
        .btn-settings { background: #b2bec3; color: white; flex: 0.2; }
        
        /* Lista de Memorizados */
        .mastered-section { margin-top: 40px; text-align: left; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .mastered-title { font-weight: bold; color: var(--success); border-bottom: 2px solid #eee; padding-bottom: 8px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .mastered-list { list-style: none; padding: 0; margin: 0; display: flex; flex-wrap: wrap; gap: 8px; }
        .mastered-item { background: #e8f5e9; color: #2e7d32; padding: 5px 12px; border-radius: 20px; font-size: 0.85rem; border: 1px solid #c8e6c9; animation: popIn 0.3s ease; }

        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* Menú Lateral */
        .drawer { position: fixed; right: -350px; top: 0; width: 300px; height: 100%; background: white; box-shadow: -5px 0 15px rgba(0,0,0,0.1); transition: 0.3s; padding: 25px; z-index: 100; display: flex; flex-direction: column; }
        .drawer.active { right: 0; }
        
        .status { margin-top: 15px; font-weight: bold; min-height: 24px; }
        .error { color: #e74c3c; }
        .success { color: var(--success); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">Discipulado Básico de Neglis Castillo </div>
    <h2 id="reference" class="reference">...</h2>
    
    <div id="verse-display" class="verse-box"></div>
    
    <input type="text" id="user-input" placeholder="Escribe el versículo aquí..." autocomplete="off">
    
    <div class="controls">
        <button class="btn-hint" onclick="giveHint()">💡 Pista</button>
        <button class="btn-settings" onclick="toggleDrawer()">⚙️</button>
    </div>

    <div id="feedback" class="status"></div>

    <div class="mastered-section">
        <div class="mastered-title">✅ Ya memorizados:</div>
        <ul id="mastered-list" class="mastered-list">
            </ul>
    </div>
</div>

<div id="drawer" class="drawer">
    <h3>Ajustes</h3>
    <input type="text" id="new-ref" placeholder="Referencia (ej: Juan 1:1)">
    <textarea id="new-text" rows="4" placeholder="Texto del versículo..." style="width:100%; padding:10px; border-radius:10px; border:1px solid #ddd; margin:10px 0; font-family:inherit;"></textarea>
    <button onclick="addNewVerse()" style="background: var(--primary); color:white; width:100%;">Guardar</button>
    <hr style="width:100%; margin: 20px 0;">
    <button onclick="clearProgress()" style="background: #ff7675; color:white; width:100%; font-size:0.8rem;">Reiniciar todo mi progreso</button>
    <button onclick="toggleDrawer()" style="background: #eee; margin-top: auto; width:100%;">Cerrar</button>
</div>

<script>
    const defaultVerses = [
        { ref: "Juan 1:12", text: "Mas a todos los que le recibieron a los que creen en su nombre les dio potestad de ser hechos hijos de Dios" }, [cite: 4, 5]
        { ref: "Juan 3:16", text: "Porque de tal manera amó Dios al mundo que ha dado a su Hijo unigénito para que todo aquel que en él cree no se pierda mas tenga vida eterna" }, [cite: 6, 7]
        { ref: "1 Pedro 2:2", text: "Desead como niños recién nacidos la leche espiritual no adulterada para que por ella crezcáis para salvación" }, [cite: 8, 9]
        { ref: "2 Corintios 5:17", text: "De modo que si alguno está en Cristo nueva criatura es las cosas viejas pasaron he aquí todas son hechas nuevas" }, [cite: 10, 11, 12]
        { ref: "Hechos 2:38", text: "Pedro les dijo Arrepentíos y bautícese cada uno de vosotros en el nombre de Jesucristo para perdón de los pecados y recibiréis el don del Espíritu Santo" }, [cite: 13, 14, 15]
        { ref: "Salmos 63:1", text: "Dios Dios mío eres tú De madrugada te buscaré Mi alma tiene sed de ti mi carne te anhela En tierra seca y árida donde no hay aguas" }, [cite: 16, 17]
        { ref: "Mateo 26:41", text: "Velad y orad para que no entréis en tentación el espíritu a la verdad está dispuesto pero la carne es débil" }, [cite: 18, 19]
        { ref: "Josué 1:8", text: "Nunca se apartará de tu boca este libro de la ley sino que de día y de noche meditarás en él para que guardes y hagas conforme a todo lo que en él está escrito porque entonces harás prosperar tu camino y todo te saldrá bien" }, [cite: 20, 21, 22]
        { ref: "Juan 5:39", text: "Escudriñad las Escrituras porque a vosotros os parece que en ellas tenéis la vida eterna y ellas son las que dan testimonio de mí" }, [cite: 23, 24, 25]
        { ref: "Hebreos 4:12", text: "Porque la palabra de Dios es viva y eficaz y más cortante que toda espada de dos filos y penetra hasta partir el alma y el espíritu las coyunturas y los tuétanos y discierne los pensamientos y las intenciones del corazón" }, [cite: 26, 27]
        { ref: "Romanos 12:12", text: "Gozosos en la esperanza sufridos en la tribulación constantes en la oración" }, [cite: 28]
        { ref: "Mateo 16:24", text: "Entonces Jesús dijo a sus discípulos Si alguno quiere venir en pos de mí niéguese a sí mismo y tome su cruz y sígame" }, [cite: 29]
        { ref: "1 Pedro 5:8", text: "Sed sobrios y velad porque vuestro adversario el diablo como león rugiente anda alrededor buscando a quien devorar" }, [cite: 30]
        { ref: "Santiago 4:7", text: "Someteos pues a Dios resistid al diablo y huirá de vosotros" }, [cite: 31]
        { ref: "Romanos 3:23", text: "Por cuanto todos pecaron y están destituidos de la gloria de Dios" }, [cite: 38]
        { ref: "Romanos 6:23", text: "Porque la paga del pecado es muerte mas la dádiva de Dios es vida eterna en Cristo Jesús Señor nuestro" }, [cite: 39]
        { ref: "Salmos 37:4", text: "Deléitate asimismo en Jehová Y él te concederá las peticiones de tu corazón" }, [cite: 40]
        { ref: "Salmos 119:105", text: "Lámpara es a mis pies tu palabra Y lumbrera a mi camino" }, [cite: 41]
        { ref: "Juan 14:6", text: "Jesús le dijo Yo soy el camino y la verdad y la vida nadie viene al Padre sino por mí" }, [cite: 42, 43]
        { ref: "Josué 1:9", text: "Mira que te mando que te esfuerces y seas valiente no temas ni desmayes porque Jehová tu Dios estará contigo en dondequiera que vayas" } [cite: 44, 45]
    ];

    let allVerses = [];
    let currentIdx = 0;
    let hiddenIndices = [];
    let masteredRefs = [];

    function init() {
        const savedCustom = JSON.parse(localStorage.getItem('myCustomVerses') || "[]");
        masteredRefs = JSON.parse(localStorage.getItem('myMasteredRefs') || "[]");
        allVerses = shuffle([...defaultVerses, ...savedCustom]);
        renderMastered();
        loadVerse();
    }

    function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

    function loadVerse() {
        const v = allVerses[currentIdx];
        document.getElementById("reference").innerText = v.ref;
        hiddenIndices = [];
        document.getElementById("user-input").value = "";
        updateDisplay();
    }

    function updateDisplay() {
        const words = allVerses[currentIdx].text.split(" ");
        document.getElementById("verse-display").innerHTML = words.map((word, i) => {
            return hiddenIndices.includes(i) ? `<span class="hidden-word" id="word-${i}">${word}</span>` : word;
        }).join(" ");
    }

    function giveHint() {
        hiddenIndices.forEach(idx => {
            const span = document.getElementById(`word-${idx}`);
            const original = span.innerText;
            span.style.color = "#2d3436";
            span.innerText = original[0] + "...";
            setTimeout(() => { span.style.color = "transparent"; span.innerText = original; }, 1200);
        });
    }

    document.getElementById("user-input").addEventListener("input", (e) => {
        const user = e.target.value.toLowerCase().replace(/[.,;¡!¿?]/g, "").trim();
        const target = allVerses[currentIdx].text.toLowerCase().replace(/[.,;¡!¿?]/g, "").trim();
        const feedback = document.getElementById("feedback");

        if (user === target) {
            feedback.innerText = "¡Correcto!"; feedback.className = "status success";
            setTimeout(nextLevel, 800);
        } else if (target.startsWith(user)) {
            feedback.innerText = "Vas bien..."; feedback.className = "status";
        } else {
            feedback.innerText = "Error..."; feedback.className = "status error";
        }
    });

    function nextLevel() {
        const words = allVerses[currentIdx].text.split(" ");
        const available = words.map((_, i) => i).filter(i => !hiddenIndices.includes(i));
        
        if (available.length > 0) {
            let toHide = Math.ceil(words.length * 0.3); // Oculta de 30% en 30%
            for(let i=0; i < toHide && available.length > 0; i++) {
                let randIdx = Math.floor(Math.random() * available.length);
                hiddenIndices.push(available.splice(randIdx, 1)[0]);
            }
            document.getElementById("feedback").innerText = "";
            document.getElementById("user-input").value = "";
            updateDisplay();
        } else {
            // Versículo Completado Totalmente
            addToMastered(allVerses[currentIdx].ref);
            currentIdx = (currentIdx + 1) % allVerses.length;
            loadVerse();
        }
    }

    function addToMastered(ref) {
        if (!masteredRefs.includes(ref)) {
            masteredRefs.push(ref);
            localStorage.setItem('myMasteredRefs', JSON.stringify(masteredRefs));
            renderMastered();
        }
    }

    function renderMastered() {
        const list = document.getElementById("mastered-list");
        list.innerHTML = masteredRefs.map(ref => `<li class="mastered-item">${ref}</li>`).join("");
    }

    function clearProgress() {
        if(confirm("¿Seguro que quieres borrar tus versículos añadidos y tu lista de memorizados?")) {
            localStorage.clear();
            location.reload();
        }
    }

    function toggleDrawer() { document.getElementById("drawer").classList.toggle("active"); }

    function addNewVerse() {
        const ref = document.getElementById("new-ref").value.trim();
        const text = document.getElementById("new-text").value.trim();
        if (!ref || !text) return;
        const saved = JSON.parse(localStorage.getItem('myCustomVerses') || "[]");
        saved.push({ ref, text });
        localStorage.setItem('myCustomVerses', JSON.stringify(saved));
        location.reload();
    }

    init();
</script>

</body>
</html>
