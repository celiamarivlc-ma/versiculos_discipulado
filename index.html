<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memorizador Personalizado</title>
    <style>
        :root { --primary: #6c5ce7; --bg: #f0f2f5; --success: #27ae60; --dark: #2d3436; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 95%; max-width: 650px; text-align: center; margin-bottom: 20px; }
        .header { color: var(--primary); font-size: 0.9rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .reference { font-size: 1.8rem; margin: 10px 0; color: var(--dark); }
        .verse-box { font-size: 1.2rem; margin: 1.5rem 0; color: var(--dark); min-height: 100px; line-height: 1.6; text-align: left; background: #fafafa; padding: 20px; border-radius: 10px; border-left: 5px solid var(--primary); }
        .hidden-word { background: #dfe6e9; color: #dfe6e9; border-bottom: 2px solid #b2bec3; border-radius: 3px; }
        input, textarea { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 1rem; outline: none; margin-bottom: 10px; box-sizing: border-box; }
        input:focus, textarea:focus { border-color: var(--primary); }
        button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { opacity: 0.9; }
        .status { margin-top: 10px; font-weight: bold; min-height: 24px; }
        .admin-panel { background: #fff; padding: 20px; border-radius: 15px; width: 95%; max-width: 650px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .admin-title { font-size: 1.1rem; margin-bottom: 15px; color: var(--dark); border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .error { color: #e74c3c; }
        .success { color: var(--success); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">Mi Memorizador de Biblia</div>
    <h2 id="reference" class="reference">Cargando...</h2>
    <div id="verse-display" class="verse-box"></div>
    <input type="text" id="user-input" placeholder="Escribe el versículo aquí..." autocomplete="off">
    <div id="feedback" class="status"></div>
    <div style="margin-top: 15px; font-size: 0.8rem; color: #888;">
        Dificultad: <span id="level-display">1</span> | Total Versículos: <span id="total-count">0</span>
    </div>
</div>

<div class="admin-panel">
    <div class="admin-title">➕ Añadir nuevo versículo</div>
    <input type="text" id="new-ref" placeholder="Ej: Filipenses 4:13">
    <textarea id="new-text" rows="2" placeholder="Escribe el texto del versículo aquí..."></textarea>
    <button onclick="addNewVerse()">Guardar Versículo</button>
    <button onclick="clearMyVerses()" style="background: #95a5a6; font-size: 0.7rem;">Borrar mis añadidos</button>
</div>

<script>
    // Versículos base del PDF [cite: 2, 3, 4, 5, 7, 9, 11, 13, 15, 17, 19, 20, 21, 22, 29, 30, 31, 32, 33, 35, 37, 38, 41]
    const defaultVerses = [
        { ref: "Juan 1:12", text: "Mas a todos los que le recibieron, a los que creen en su nombre, les dio potestad de ser hechos hijos de Dios" },
        { ref: "Juan 3:16", text: "Porque de tal manera amó Dios al mundo, que ha dado a su Hijo unigénito, para que todo aquel que en él cree, no se pierda, mas tenga vida eterna" },
        { ref: "1 Pedro 2:2", text: "Desead, como niños recién nacidos, la leche espiritual no adulterada, para que por ella crezcáis para salvación" },
        { ref: "2 Corintios 5:17", text: "De modo que si alguno está en Cristo, nueva criatura es; las cosas viejas pasaron; he aquí todas son hechas nuevas" },
        { ref: "Hechos 2:38", text: "Pedro les dijo: Arrepentíos, y bautícese cada uno de vosotros en el nombre de Jesucristo para perdón de los pecados; y recibiréis el don del Espíritu Santo" },
        { ref: "Salmos 63:1", text: "Dios, Dios mío eres tú; De madrugada te buscaré; Mi alma tiene sed de ti, mi carne te anhela, En tierra seca y árida donde no hay aguas" },
        { ref: "Mateo 26:41", text: "Velad y orad, para que no entréis en tentación; el espíritu a la verdad está dispuesto, pero la carne es débil" },
        { ref: "Josué 1:8", text: "Nunca se apartará de tu boca este libro de la ley, sino que de día y de noche meditarás en él, para que guardes y hagas conforme a todo lo que en él está escrito; porque entonces harás prosperar tu camino, y todo te saldrá bien" },
        { ref: "Juan 5:39", text: "Escudriñad las Escrituras; porque a vosotros os parece que en ellas tenéis la vida eterna; y ellas son las que dan testimonio de mí" },
        { ref: "Hebreos 4:12", text: "Porque la palabra de Dios es viva y eficaz, y más cortante que toda espada de dos filos; y penetra hasta partir el alma y el espíritu, las coyunturas y los tuétanos, y discierne los pensamientos y las intenciones del corazón" },
        { ref: "Romanos 12:12", text: "Gozosos en la esperanza; sufridos en la tribulación; constantes en la oración" },
        { ref: "Mateo 16:24", text: "Entonces Jesús dijo a sus discípulos: Si alguno quiere venir en pos de mí, niéguese a sí mismo, y tome su cruz, y sígame" },
        { ref: "1 Pedro 5:8", text: "Sed sobrios, y velad; porque vuestro adversario el diablo, como león rugiente, anda alrededor buscando a quien devorar" },
        { ref: "Santiago 4:7", text: "Someteos, pues, a Dios; resistid al diablo, y huirá de vosotros" },
        { ref: "Romanos 3:23", text: "Por cuanto todos pecaron, y están destituidos de la gloria de Dios" },
        { ref: "Romanos 6:23", text: "Porque la paga del pecado es muerte, mas la dádiva de Dios es vida eterna en Cristo Jesús Señor nuestro" },
        { ref: "Salmos 37:4", text: "Deléitate asimismo en Jehová, Y él te concederá las peticiones de tu corazón" },
        { ref: "Salmos 119:105", text: "Lámpara es a mis pies tu palabra, Y lumbrera a mi camino" },
        { ref: "Juan 14:6", text: "Jesús le dijo: Yo soy el camino, y la verdad, y la vida; nadie viene al Padre, sino por mí" },
        { ref: "Josué 1:9", text: "Mira que te mando que te esfuerces y seas valiente; no temas ni desmayes, porque Jehová tu Dios estará contigo en dondequiera que vayas" },
        { ref: "Jeremías 33:3", text: "Clama a mí, y yo te responderé, y te enseñaré cosas grandes y ocultas que tú no conoces" },
        { ref: "Salmos 133:1", text: "Mirad cuán bueno y cuán delicioso es Habitar los hermanos juntos en armonía" },
        { ref: "Salmos 42:1", text: "Como el ciervo brama por las corrientes de las aguas, Así clama por ti, oh Dios, el alma mía" }
    ];

    let allVerses = [];
    let currentIdx = 0;
    let hiddenIndices = [];
    let level = 1;

    // Cargar datos al iniciar
    function init() {
        const saved = JSON.parse(localStorage.getItem('myCustomVerses') || "[]");
        allVerses = shuffle([...defaultVerses, ...saved]);
        document.getElementById("total-count").innerText = allVerses.length;
        loadVerse();
    }

    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    function loadVerse() {
        if (allVerses.length === 0) return;
        const v = allVerses[currentIdx];
        document.getElementById("reference").innerText = v.ref;
        hiddenIndices = [];
        level = 1;
        document.getElementById("level-display").innerText = level;
        document.getElementById("user-input").value = "";
        updateDisplay();
    }

    function updateDisplay() {
        const words = allVerses[currentIdx].text.split(" ");
        document.getElementById("verse-display").innerHTML = words.map((word, i) => {
            return hiddenIndices.includes(i) ? `<span class="hidden-word">${word}</span>` : word;
        }).join(" ");
    }

    document.getElementById("user-input").addEventListener("input", (e) => {
        const user = e.target.value.toLowerCase().replace(/[.,;¡!¿?]/g, "").trim();
        const target = allVerses[currentIdx].text.toLowerCase().replace(/[.,;¡!¿?]/g, "").trim();
        const feedback = document.getElementById("feedback");

        if (user === target) {
            feedback.innerText = "¡Excelente!"; feedback.className = "status success";
            setTimeout(nextLevel, 800);
        } else if (target.startsWith(user)) {
            feedback.innerText = "Escribiendo..."; feedback.className = "status";
        } else {
            feedback.innerText = "Error detectado"; feedback.className = "status error";
        }
    });

    function nextLevel() {
        const words = allVerses[currentIdx].text.split(" ");
        const available = words.map((_, i) => i).filter(i => !hiddenIndices.includes(i));
        
        if (available.length > 0) {
            let toHide = Math.ceil(words.length * 0.25);
            for(let i=0; i < toHide && available.length > 0; i++) {
                let randIdx = Math.floor(Math.random() * available.length);
                hiddenIndices.push(available.splice(randIdx, 1)[0]);
            }
            level++;
            document.getElementById("level-display").innerText = level;
            document.getElementById("user-input").value = "";
            document.getElementById("feedback").innerText = "";
            updateDisplay();
        } else {
            currentIdx = (currentIdx + 1) % allVerses.length;
            loadVerse();
        }
    }

    // Funciones de Administración
    function addNewVerse() {
        const ref = document.getElementById("new-ref").value.trim();
        const text = document.getElementById("new-text").value.trim();
        
        if (!ref || !text) { alert("Por favor llena ambos campos"); return; }

        const saved = JSON.parse(localStorage.getItem('myCustomVerses') || "[]");
        saved.push({ ref, text });
        localStorage.setItem('myCustomVerses', JSON.stringify(saved));
        
        alert("¡Versículo guardado! Refresca la página para que aparezca en la mezcla.");
        document.getElementById("new-ref").value = "";
        document.getElementById("new-text").value = "";
    }

    function clearMyVerses() {
        if(confirm("¿Seguro que quieres borrar SOLO los versículos que tú añadiste?")) {
            localStorage.removeItem('myCustomVerses');
            location.reload();
        }
    }

    init();
</script>

</body>
</html>
