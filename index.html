<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memorizador Bíblico - IE Alaquàs</title>
    <style>
        :root { --primary: #6c5ce7; --bg: #f0f2f5; --success: #27ae60; --error: #e74c3c; --accent: #fdcb6e; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        
        .container { background: white; padding: 2rem; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 95%; max-width: 550px; text-align: center; }
        
        /* Título de la Iglesia */
        .church-header { margin-bottom: 1.5rem; border-bottom: 2px solid #f0f2f5; padding-bottom: 1rem; }
        .church-header h1 { color: var(--primary); margin: 0; font-size: 1.4rem; text-transform: uppercase; letter-spacing: 1px; }
        .church-header p { color: #636e72; margin: 5px 0 0; font-size: 0.9rem; font-weight: 600; }

        /* Stats Bar */
        .stats-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; background: #f8f9fa; padding: 10px 15px; border-radius: 15px; }
        .hearts { color: var(--error); font-size: 1.2rem; font-weight: bold; }
        .learned-count { font-size: 0.85rem; color: #636e72; font-weight: 700; }

        /* Verse Area */
        .reference { font-size: 1.6rem; margin: 0.5rem 0; color: #2d3436; font-weight: 800; }
        .verse-box { min-height: 100px; margin: 1rem 0; padding: 20px; background: #fafafa; border: 2px solid #edf2f7; border-radius: 18px; font-size: 1.2rem; line-height: 1.5; display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
        
        /* Chips & Slots */
        .slot { border-bottom: 2px solid #d1d8e0; min-width: 40px; height: 28px; }
        .chip { background: white; border: 2px solid #d1d8e0; padding: 8px 14px; border-radius: 12px; cursor: pointer; font-weight: 600; box-shadow: 0 3px 0 #d1d8e0; transition: 0.1s; font-size: 1rem; }
        .chip:active { transform: translateY(2px); box-shadow: none; }
        .chip.wrong { background: var(--error) !important; color: white; border-color: #c0392b; animation: shake 0.3s; }
        .chip.used { opacity: 0; pointer-events: none; }

        /* Progress */
        .progress-container { height: 100%; width: 100%; background: #eee; border-radius: 10px; overflow: hidden; height: 8px; margin-bottom: 15px; }
        .progress-fill { height: 100%; background: var(--primary); transition: 0.5s; width: 0%; }

        /* Controls */
        .btn-main { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 14px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; font-size: 1rem; }
        .input-area { display: flex; gap: 8px; margin-top: 15px; }
        input { flex: 1; padding: 12px; border: 2px solid #eee; border-radius: 12px; outline: none; font-size: 1rem; }

        /* Modales */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: white; padding: 2rem; border-radius: 24px; width: 100%; max-width: 400px; max-height: 75vh; overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .list-item { text-align: left; padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body>

<div class="container">
    <header class="church-header">
        <h1>Memorizador Bíblico</h1>
        <p>Iglesia Evangelica Alaquas</p>
    </header>

    <div class="stats-bar">
        <button onclick="showLibrary()" style="background:none; border:none; font-size:1.5rem; cursor:pointer;" title="Biblioteca">📚</button>
        <div class="learned-count">PROGRESO: <span id="learned-val">0</span>/30</div>
        <div class="hearts" id="hearts-display">❤️❤️❤️❤️❤️</div>
    </div>

    <div class="progress-container"><div id="progress-bar" class="progress-fill"></div></div>
    
    <div id="game-view">
        <h2 id="reference" class="reference">...</h2>
        <div id="verse-display" class="verse-box"></div>
        <div id="chips-container" style="display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:15px;"></div>
        
        <div class="input-area" id="write-mode-input" style="display:none;">
            <input type="text" id="user-input" placeholder="Escribe el versículo completo...">
            <button onclick="startVoice()" style="background:var(--error); border:none; border-radius:12px; padding:0 15px; color:white; cursor:pointer;">🎤</button>
        </div>

        <div style="margin-top:20px; display:flex; gap:10px;">
            <button class="btn-main" style="background:#edf2f7; color:#2d3436;" onclick="giveHint()">Pista 👁️</button>
            <button class="btn-main" onclick="toggleMode()">Cambiar Modo 🔄</button>
        </div>
    </div>
</div>

<div id="library-modal" class="modal" onclick="if(event.target==this)this.style.display='none'">
    <div class="modal-content">
        <h3>Versículos del Discipulado</h3>
        <div id="verse-list-container"></div>
        <button class="btn-main" onclick="document.getElementById('library-modal').style.display='none'">Continuar</button>
    </div>
</div>

<script>
    const masterVerses = [
        { r: "Salmos 23:1", t: "Jehová es mi pastor nada me faltará" },
        { r: "Juan 14:6", t: "Jesús le dijo Yo soy el camino y la verdad y la vida" },
        { r: "Filipenses 4:13", t: "Todo lo puedo en Cristo que me fortalece" },
        { r: "1 Juan 1:9", t: "Si confesamos nuestros pecados él es fiel y justo para perdonar nuestros pecados" },
        { r: "Juan 1:12", t: "Mas a todos los que le recibieron les dio potestad de ser hechos hijos de Dios" },
        { r: "Gálatas 2:20", t: "Con Cristo estoy juntamente crucificado y ya no vivo yo mas vive Cristo en mí" },
        { r: "Mateo 28:19", t: "Por tanto id y haced discípulos a todas las naciones bautizándoles en el nombre del Padre" },
        { r: "Romanos 3:23", t: "Por cuanto todos pecaron y están destituidos de la gloria de Dios" },
        { r: "Josué 1:8", t: "Nunca se apartará de tu boca este libro de la ley sino que de día y de noche meditarás en él" },
        { r: "Efesios 2:8", t: "Porque por gracia sois salvos por medio de la fe y esto no de vosotros pues es don de Dios" },
        { r: "Proverbios 3:5", t: "Fíate de Jehová de todo tu corazón y no te apoyes en tu propia prudencia" },
        { r: "Mateo 6:33", t: "Mas buscad primeramente el reino de Dios y su justicia y todas estas cosas os serán añadidas" },
        { r: "2 Timoteo 3:16", t: "Toda la Escritura es inspirada por Dios y útil para enseñar para redargüir para corregir" },
        { r: "Salmos 119:11", t: "En mi corazón he guardado tus dichos para no pecar contra ti" },
        { r: "Romanos 6:23", t: "Porque la paga del pecado es muerte mas la dádiva de Dios es vida eterna en Cristo Jesús" },
        { r: "Isaías 41:10", t: "No temas porque yo estoy contigo no desmayes porque yo soy tu Dios que te esfuerzo" },
        { r: "Hebreos 11:1", t: "Es pues la fe la certeza de lo que se espera la convicción de lo que no se ve" },
        { r: "Romanos 12:1", t: "Así que hermanos os ruego por las misericordias de Dios que presentéis vuestros cuerpos en sacrificio vivo" },
        { r: "Juan 3:16", t: "Porque de tal manera amó Dios al mundo que ha dado a su Hijo unigénito para que todo aquel que en él cree no se pierda" },
        { r: "Jeremías 29:11", t: "Porque yo sé los pensamientos que tengo acerca de vosotros dice Jehová pensamientos de paz y no de mal" },
        { r: "Filipenses 4:6", t: "Por nada estéis afanosos sino sean conocidas vuestras peticiones delante de Dios en toda oración y ruego" },
        { r: "Gálatas 6:7", t: "No os engañéis Dios no puede ser burlado pues todo lo que el hombre sembrare eso también segará" },
        { r: "Salmos 1:1", t: "Bienaventurado el varón que no anduvo en consejo de malos ni en camino de pecadores estuvo" },
        { r: "Hechos 1:8", t: "Pero recibiréis poder cuando haya venido sobre vosotros el Espíritu Santo y me seréis testigos" },
        { r: "1 Corintios 10:13", t: "No os ha sobrevenido ninguna tentación que no sea humana pero fiel es Dios que no os dejará ser tentados más de lo que podéis" },
        { r: "Romanos 8:28", t: "Y sabemos que a los que aman a Dios todas las cosas les ayudan a bien esto es a los que conforme a su propósito son llamados" },
        { r: "Santiago 1:22", t: "Pero sed hacedores de la palabra y no tan solamente oidores engañándoos a vosotros mismos" },
        { r: "Hebreos 4:12", t: "Porque la palabra de Dios es viva y eficaz y más cortante que toda espada de dos filos" },
        { r: "Josué 1:9", t: "Mira que te mando que te esfuerces y seas valiente no temas ni desmayes porque Jehová tu Dios estará contigo" },
        { r: "Salmos 37:4", t: "Deléitate asimismo en Jehová y él te concederá las peticiones de tu corazón" }
    ];

    let currentIdx = 0;
    let lives = 5;
    let mode = 'order'; 
    let learnedVerses = JSON.parse(localStorage.getItem('biblia_learned')) || [];
    let currentWords = [];
    let correctCount = 0;

    function init() {
        renderVerse();
        updateStats();
    }

    function renderVerse() {
        const verse = masterVerses[currentIdx];
        document.getElementById('reference').innerText = verse.r;
        const display = document.getElementById('verse-display');
        const chips = document.getElementById('chips-container');
        const inputDiv = document.getElementById('write-mode-input');
        
        display.innerHTML = "";
        chips.innerHTML = "";
        correctCount = 0;
        currentWords = verse.t.split(" ");

        if (mode === 'order') {
            inputDiv.style.display = "none";
            currentWords.forEach(() => {
                let s = document.createElement('div');
                s.className = 'slot';
                display.appendChild(s);
            });
            [...currentWords].sort(() => Math.random() - 0.5).forEach(w => {
                let b = document.createElement('button');
                b.className = 'chip';
                b.innerText = w;
                b.onclick = () => checkWord(w, b);
                chips.appendChild(b);
            });
        } else {
            inputDiv.style.display = "flex";
            display.innerText = "Escribe el versículo...";
            document.getElementById('user-input').value = "";
        }
    }

    function checkWord(word, btn) {
        if (word === currentWords[correctCount]) {
            const slots = document.querySelectorAll('.slot');
            slots[correctCount].innerText = word;
            slots[correctCount].style.border = "none";
            slots[correctCount].style.color = "var(--primary)";
            btn.classList.add('used');
            correctCount++;
            if (correctCount === currentWords.length) handleWin();
        } else {
            lives--;
            btn.classList.add('wrong');
            updateStats();
            setTimeout(() => btn.classList.remove('wrong'), 500);
            if (lives <= 0) {
                alert("Has perdido tus vidas. ¡El versículo se reinicia!");
                lives = 5;
                renderVerse();
                updateStats();
            }
        }
    }

    function handleWin() {
        if (!learnedVerses.includes(masterVerses[currentIdx].r)) {
            learnedVerses.push(masterVerses[currentIdx].r);
            localStorage.setItem('biblia_learned', JSON.stringify(learnedVerses));
        }
        updateStats();
        alert("¡Bien hecho! Versículo memorizado.");
        currentIdx = (currentIdx + 1) % masterVerses.length;
        renderVerse();
    }

    function updateStats() {
        document.getElementById('hearts-display').innerText = "❤️".repeat(lives);
        document.getElementById('learned-val').innerText = learnedVerses.length;
        const progress = (learnedVerses.length / masterVerses.length) * 100;
        document.getElementById('progress-bar').style.width = progress + "%";
    }

    function toggleMode() {
        mode = mode === 'order' ? 'write' : 'order';
        renderVerse();
    }

    function showLibrary() {
        const modal = document.getElementById('library-modal');
        const container = document.getElementById('verse-list-container');
        modal.style.display = 'flex';
        container.innerHTML = masterVerses.map(v => `
            <div class="list-item">
                <span><b>${v.r}</b></span>
                <span>${learnedVerses.includes(v.r) ? '✅' : '⏳'}</span>
            </div>
        `).join("");
    }

    function giveHint() {
        const display = document.getElementById('verse-display');
        const original = masterVerses[currentIdx].t;
        display.innerText = original;
        display.style.color = "var(--primary)";
        setTimeout(() => {
            display.style.color = "inherit";
            if(mode === 'order') renderVerse(); 
            else display.innerText = "Escribe el versículo...";
        }, 1500);
    }

    document.getElementById('user-input').oninput = function(e) {
        const target = masterVerses[currentIdx].t.toLowerCase().replace(/[.,]/g,"");
        const user = e.target.value.toLowerCase().replace(/[.,]/g,"");
        if (user === target) handleWin();
    };

    function startVoice() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-ES';
        recognition.onresult = (e) => {
            const text = e.results[0][0].transcript;
            document.getElementById('user-input').value = text;
            document.getElementById('user-input').dispatchEvent(new Event('input'));
        };
        recognition.start();
    }

    init();
</script>
</body>
</html>
